<section data-page="kb">
  <header class="page-header">
    <div>
      <h1>База знаний</h1>
      <div class="page-header__sub">Статьи, на которые опирается ассистент при ответах</div>
    </div>
    <div class="row" style="gap: var(--space-2);">
      <button class="btn btn--ghost" data-slot="bulk-btn">Импорт zip / md</button>
      <button class="btn btn--primary" data-slot="new-btn">+ Новая статья</button>
    </div>
  </header>

  <div class="row" data-slot="filters" style="margin-bottom: var(--space-4); align-items: flex-end;">
    <div class="field">
      <label>Модуль</label>
      <input name="module" placeholder="например, Документы">
    </div>
    <button type="button" class="btn btn--ghost btn--sm" data-slot="apply">Применить</button>
  </div>

  <div class="card" data-slot="list-wrap">
    <span class="loader-l2"></span>
  </div>

  <div data-slot="detail"></div>

  <div data-slot="editor" hidden></div>
</section>
