name: tests

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:
    inputs:
      strict:
        description: "Strict mode для e2e (console warnings и 4xx → FAIL)"
        type: boolean
        required: false
        default: false

# Если в будущем e2e станет узким местом — можно ограничить его триггер
# меткой на PR:
#   on:
#     pull_request:
#       types: [labeled, synchronize]
#   jobs:
#     e2e:
#       if: contains(github.event.pull_request.labels.*.name, 'e2e')
# и оставить push + workflow_dispatch как есть.

jobs:
  pytest:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11", "3.12"]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: "pip"

      - name: Install
        run: |
          python -m pip install --upgrade pip setuptools wheel
          pip install -e ".[dev]"

      - name: Pytest
        run: pytest -q

  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"
      - run: |
          python -m pip install --upgrade pip
          pip install ruff
      - run: ruff check .

  e2e:
    name: e2e (Playwright)
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"

      - name: Install Python deps
        run: |
          python -m pip install --upgrade pip setuptools wheel
          pip install -e ".[dev,e2e]"

      - name: Cache Playwright browsers
        id: pw-cache
        uses: actions/cache@v4
        with:
          path: ~/.cache/ms-playwright
          key: pw-${{ runner.os }}-chromium-v1

      - name: Install Chromium (only if cache miss)
        if: steps.pw-cache.outputs.cache-hit != 'true'
        run: playwright install --with-deps chromium

      - name: Install system deps (always — for cached browser)
        if: steps.pw-cache.outputs.cache-hit == 'true'
        run: playwright install-deps chromium

      - name: Prepare demo .env
        run: cp .env.demo .env

      - name: Init DB + seed sample tickets
        run: |
          python -m scripts.init_db
          python -m scripts.ingest_tickets data/sample_tickets.csv

      - name: Start uvicorn (background)
        run: |
          nohup python -m uvicorn api.main:app \
            --host 127.0.0.1 --port 8765 \
            > /tmp/uvicorn.log 2>&1 &
          echo $! > /tmp/uvicorn.pid
          # ждём пока сервер ответит на /health
          for i in $(seq 1 30); do
            if curl -sf http://127.0.0.1:8765/health > /dev/null; then
              echo "Server up after ${i}s"
              break
            fi
            sleep 1
          done
          curl -sf http://127.0.0.1:8765/health || (echo "Server did not start" && cat /tmp/uvicorn.log && exit 1)

      - name: Run E2E audit
        # При ручном dispatch с inputs.strict=true передаём --strict
        # (console warnings и 4xx тоже валят CI).
        run: |
          ARGS="--base-url http://127.0.0.1:8765"
          if [ "${{ inputs.strict }}" = "true" ]; then
            ARGS="$ARGS --strict"
          fi
          python -m scripts.e2e_audit $ARGS

      - name: Stop uvicorn
        if: always()
        run: |
          if [ -f /tmp/uvicorn.pid ]; then
            kill "$(cat /tmp/uvicorn.pid)" || true
          fi

      - name: Upload artifacts (report + screenshots + uvicorn log)
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: e2e-report-${{ github.run_id }}
          path: |
            /tmp/sa_audit_report.json
            /tmp/sa_audit_screenshots/
            /tmp/uvicorn.log
          if-no-files-found: warn
          retention-days: 14
